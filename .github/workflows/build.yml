name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode signing keystore
        run: echo "$SIGNING_KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/recomp.p12"
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}

      - name: Build signed release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/recomp.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk recomp.apk

      - name: Read version
        id: ver
        run: echo "version=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)" >> "$GITHUB_OUTPUT"

      # Publishes/refreshes a "latest" release so the APK is one tap to
      # download on the phone. The release name carries the version — the
      # app's in-app update checker parses it.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Recomp v${{ steps.ver.outputs.version }}
          files: recomp.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
