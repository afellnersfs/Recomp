name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk recomp.apk

      # Publishes/refreshes a "latest" release so the APK is one tap to
      # download on the phone (Releases page > recomp.apk).
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Recomp — latest build
          files: recomp.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
